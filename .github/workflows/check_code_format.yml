name: Check Code Format

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  # Install packages into system environment.
  # Follows: https://docs.astral.sh/uv/guides/integration/github/#using-uv-pip
  UV_SYSTEM_PYTHON: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-code-changes:
    name: Detect Code Changes
    runs-on: ubuntu-latest
    outputs:
      run-tests: ${{ steps.filter.outputs.run-tests }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          list-files: shell
          filters: |
            run-tests:
              - '!docs/**'
              - '!docker/**'
              - '!.github/**'
              - '.github/workflows/check_code_format.yml'
  check-code-format:
    name: Check Code Format
    needs: detect-code-changes
    if: needs.detect-code-changes.outputs.run-tests == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set Up uv
        uses: astral-sh/setup-uv@v7
        id: setup-uv
        with:
          version: 0.11.15
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Set Up Environment
        run: |
          make install-pinned-3.13
      - name: Run Format Check
        run: |
          make format-check
      - name: Run Type Check
        run: |
          make type-check
      - name: Run Header Check
        run: |
          make add-header
          git diff --name-only .
          git diff --quiet --name-only . || exit -1
